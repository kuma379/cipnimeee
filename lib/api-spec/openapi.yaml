openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: CipNime Anime Scraper API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: anime
    description: Anime scraping operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /anime/latest:
    get:
      operationId: getLatestAnime
      tags: [anime]
      summary: Get latest anime episodes
      description: Fetch latest anime episodes from multiple sources
      parameters:
        - name: source
          in: query
          required: false
          schema:
            type: string
            enum: [otakudesu, samehadaku, kusonime, anoboy, all]
            default: all
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Latest anime episodes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnimeListResponse"
  /anime/popular:
    get:
      operationId: getPopularAnime
      tags: [anime]
      summary: Get popular anime
      description: Fetch popular/ongoing anime from multiple sources
      parameters:
        - name: source
          in: query
          required: false
          schema:
            type: string
            enum: [otakudesu, samehadaku, kusonime, anoboy, all]
            default: all
      responses:
        "200":
          description: Popular anime list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnimeListResponse"
  /anime/search:
    get:
      operationId: searchAnime
      tags: [anime]
      summary: Search anime
      description: Search for anime across sources
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: source
          in: query
          required: false
          schema:
            type: string
            enum: [otakudesu, samehadaku, kusonime, anoboy, all]
            default: all
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnimeListResponse"
  /anime/detail:
    get:
      operationId: getAnimeDetail
      tags: [anime]
      summary: Get anime detail
      description: Get detailed information about an anime
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
        - name: source
          in: query
          required: true
          schema:
            type: string
            enum: [otakudesu, samehadaku, kusonime, anoboy]
      responses:
        "200":
          description: Anime detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnimeDetail"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /anime/episode:
    get:
      operationId: getEpisodeStreaming
      tags: [anime]
      summary: Get episode streaming links
      description: Get streaming links for an episode
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
        - name: source
          in: query
          required: true
          schema:
            type: string
            enum: [otakudesu, samehadaku, kusonime, anoboy]
      responses:
        "200":
          description: Episode streaming data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpisodeDetail"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AnimeItem:
      type: object
      properties:
        title:
          type: string
        url:
          type: string
        thumbnail:
          type: ["string", "null"]
        episode:
          type: ["string", "null"]
        genre:
          type: ["string", "null"]
        source:
          type: string
          enum: [otakudesu, samehadaku, kusonime, anoboy]
        rating:
          type: ["string", "null"]
        status:
          type: ["string", "null"]
        type:
          type: ["string", "null"]
      required:
        - title
        - url
        - source
    AnimeListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AnimeItem"
        total:
          type: integer
        sources:
          type: array
          items:
            type: string
      required:
        - items
        - total
        - sources
    EpisodeLink:
      type: object
      properties:
        label:
          type: string
        url:
          type: string
        quality:
          type: ["string", "null"]
        server:
          type: ["string", "null"]
      required:
        - label
        - url
    EpisodeDetail:
      type: object
      properties:
        title:
          type: string
        animeTitle:
          type: ["string", "null"]
        episode:
          type: ["string", "null"]
        thumbnail:
          type: ["string", "null"]
        streamingLinks:
          type: array
          items:
            $ref: "#/components/schemas/EpisodeLink"
        downloadLinks:
          type: array
          items:
            $ref: "#/components/schemas/EpisodeLink"
        source:
          type: string
      required:
        - title
        - streamingLinks
        - downloadLinks
        - source
    AnimeDetail:
      type: object
      properties:
        title:
          type: string
        thumbnail:
          type: ["string", "null"]
        synopsis:
          type: ["string", "null"]
        genre:
          type: array
          items:
            type: string
        status:
          type: ["string", "null"]
        episodes:
          type: ["integer", "null"]
        rating:
          type: ["string", "null"]
        type:
          type: ["string", "null"]
        studio:
          type: ["string", "null"]
        episodeList:
          type: array
          items:
            $ref: "#/components/schemas/AnimeEpisodeItem"
        source:
          type: string
      required:
        - title
        - genre
        - episodeList
        - source
    AnimeEpisodeItem:
      type: object
      properties:
        episode:
          type: string
        url:
          type: string
        date:
          type: ["string", "null"]
      required:
        - episode
        - url
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
